{% extends "admin/base_site.html" %}
{% block content %}
<style>
.chat-container {
    max-width: 800px;
    margin: 0 auto;
    background: #f0f2f5;
    border-radius: 10px;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
}
.chat-header {
    background: #4a76a8;
    color: white;
    padding: 15px;
    font-size: 18px;
    font-weight: bold;
}
.chat-messages {
    height: 500px;
    overflow-y: auto;
    padding: 15px;
    background: #fff;
    display: flex;
    flex-direction: column;
}
.message {
    max-width: 70%;
    margin-bottom: 15px;
    clear: both;
    display: flex;
}
.message.client {
    justify-content: flex-start;
}
.message.admin {
    justify-content: flex-end;
}
.message-bubble {
    padding: 10px 15px;
    border-radius: 20px;
    position: relative;
    word-wrap: break-word;
}
.client .message-bubble {
    background: #e4e6eb;
    color: #050505;
    border-bottom-left-radius: 5px;
}
.admin .message-bubble {
    background: #0084ff;
    color: white;
    border-bottom-right-radius: 5px;
}
.message-time {
    font-size: 11px;
    color: #999;
    margin-top: 5px;
    display: block;
}
.chat-input {
    padding: 15px;
    background: #fff;
    border-top: 1px solid #ddd;
    display: flex;
}
.chat-input textarea {
    flex: 1;
    border: 1px solid #ccc;
    border-radius: 20px;
    padding: 10px 15px;
    resize: none;
    font-family: inherit;
}
.chat-input button {
    background: #0084ff;
    border: none;
    color: white;
    border-radius: 20px;
    padding: 0 20px;
    margin-left: 10px;
    cursor: pointer;
}
.chat-input button:hover {
    background: #0066cc;
}
</style>

<div class="chat-container">
    <div class="chat-header">
        💬 Чат с {{ client.name }} (VK ID: {{ client.vk_id }})
    </div>
    <div class="chat-messages" id="chat-messages">
        {% for msg in messages %}
        <div class="message {% if msg.is_admin %}admin{% else %}client{% endif %}">
            <div class="message-bubble">
                {{ msg.message_text }}
                <span class="message-time">{{ msg.timestamp|date:"H:i:s" }}</span>
            </div>
        </div>
        {% endfor %}
    </div>
    <div class="chat-input">
        <textarea id="message-text" rows="2" placeholder="Введите сообщение..."></textarea>
        <button id="send-btn">➤</button>
    </div>
</div>

<script>
    var messagesDiv = document.getElementById('chat-messages');
    messagesDiv.scrollTop = messagesDiv.scrollHeight;

    document.getElementById('send-btn').onclick = function() {
        var textarea = document.getElementById('message-text');
        var text = textarea.value.trim();
        if (!text) return;
        fetch('/admin/bot/chatmessage/send_message/', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/x-www-form-urlencoded',
                'X-CSRFToken': '{{ csrf_token }}'
            },
            body: 'client_id={{ client.id }}&message=' + encodeURIComponent(text)
        }).then(response => response.json()).then(data => {
            if (data.status === 'ok') {
                textarea.value = '';
                location.reload();
            }
        });
    };

    document.getElementById('message-text').addEventListener('keydown', function(e) {
        if (e.ctrlKey && e.key === 'Enter') {
            document.getElementById('send-btn').click();
        }
    });

    setInterval(function() {
        if (!document.hidden) {
            fetch(window.location.href)
                .then(response => response.text())
                .then(html => {
                    var parser = new DOMParser();
                    var doc = parser.parseFromString(html, 'text/html');
                    var newMessages = doc.querySelector('.chat-messages').innerHTML;
                    if (messagesDiv.innerHTML !== newMessages) {
                        messagesDiv.innerHTML = newMessages;
                        messagesDiv.scrollTop = messagesDiv.scrollHeight;
                    }
                });
        }
    }, 5000);
</script>
{% endblock %}
